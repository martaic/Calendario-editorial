<title>QuantumSec — Calendario de Contenido</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06010F; --panel:#100820; --card:#180D2E; --border:#2E1A4A;
  --text:#F0EBFF; --muted:rgba(240,235,255,0.5); --faint:rgba(240,235,255,0.15);
  --green:#A8FF3E; --pink:#FF2E9A; --cyan:#29F1FF; --yellow:#FFD93D; --purple:#B97FFF;
  --orange:#FF8C42;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased;}
.topbar{position:sticky;top:0;z-index:100;background:rgba(6,1,15,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0.9rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.logo{font-family:var(--mono);font-size:0.85rem;font-weight:600;letter-spacing:0.1em;color:var(--green);}
.logo span{color:var(--muted);}
.week-nav{display:flex;align-items:center;gap:0.6rem;margin-left:auto;}
.week-label{font-family:var(--mono);font-size:0.8rem;color:var(--muted);}
.btn-nav{background:none;border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;transition:border-color .2s;}
.btn-nav:hover{border-color:var(--green);}
.statsbar{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.stat{flex:1;background:var(--panel);padding:0.8rem 1rem;display:flex;flex-direction:column;gap:0.2rem;}
.stat-num{font-family:var(--mono);font-size:1.4rem;font-weight:600;}
.stat-label{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
.stat-num.green{color:var(--green);}.stat-num.pink{color:var(--pink);}.stat-num.cyan{color:var(--cyan);}.stat-num.yellow{color:var(--yellow);}.stat-num.orange{color:var(--orange);}
.filters{padding:0.8rem 1.5rem;display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--panel);}
.filter-label{font-size:0.75rem;color:var(--muted);font-family:var(--mono);margin-right:0.3rem;}
.chip{font-size:0.72rem;font-family:var(--mono);border:1px solid var(--border);border-radius:999px;padding:0.3rem 0.75rem;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s;}
.chip:hover,.chip.active{border-color:var(--green);color:var(--green);background:rgba(168,255,62,0.08);}
.chip[data-filter="kike"].active{border-color:var(--pink);color:var(--pink);background:rgba(255,46,154,0.08);}
.chip[data-filter="pendiente"].active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,217,61,0.08);}
.chip[data-filter="en-produccion"].active{border-color:var(--orange);color:var(--orange);background:rgba(255,140,66,0.08);}
.chip[data-filter="sin-empezar"].active{border-color:var(--muted);color:var(--text);background:rgba(240,235,255,0.06);}
.grid-wrap{overflow-x:auto;padding:1.5rem;}
.calendar-grid{display:grid;grid-template-columns:repeat(7,minmax(210px,1fr));gap:1rem;min-width:1400px;}
.day-col{display:flex;flex-direction:column;gap:0.6rem;}
.day-header{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:0.7rem 0.9rem;display:flex;flex-direction:column;gap:0.1rem;}
.day-name{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.day-date{font-weight:700;font-size:1.05rem;}
.day-header.today{border-color:var(--green);background:rgba(168,255,62,0.05);}
.day-header.today .day-name{color:var(--green);}
.day-header.weekend .day-date{color:var(--muted);}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.85rem;display:flex;flex-direction:column;gap:0.55rem;transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative;}
.card:hover{transform:translateY(-2px);}
.card.approved{border-left:3px solid var(--green);}.card.approved:hover{box-shadow:0 8px 24px -8px rgba(168,255,62,0.3);}
.card.rejected{border-left:3px solid var(--pink);opacity:0.6;}
.card.pending{border-left:3px solid var(--yellow);}.card.pending:hover{box-shadow:0 8px 24px -8px rgba(255,217,61,0.2);}
.card-top{display:flex;align-items:flex-start;gap:0.5rem;justify-content:space-between;}
.type-badge{font-family:var(--mono);font-size:0.62rem;letter-spacing:0.06em;text-transform:uppercase;border-radius:999px;padding:0.22rem 0.6rem;white-space:nowrap;flex-shrink:0;}
.badge-linkedin{background:rgba(41,241,255,0.15);color:var(--cyan);border:1px solid rgba(41,241,255,0.3);}
.badge-carrusel{background:rgba(185,127,255,0.15);color:var(--purple);border:1px solid rgba(185,127,255,0.3);}
.badge-animado{background:rgba(168,255,62,0.15);color:var(--green);border:1px solid rgba(168,255,62,0.3);}
.badge-kike{background:rgba(255,46,154,0.15);color:var(--pink);border:1px solid rgba(255,46,154,0.3);}
.badge-short{background:rgba(255,217,61,0.15);color:var(--yellow);border:1px solid rgba(255,217,61,0.3);}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.dot-pending{background:var(--yellow);}.dot-approved{background:var(--green);}.dot-rejected{background:var(--pink);}
.card-title{font-weight:600;font-size:0.88rem;line-height:1.35;}
.platforms{display:flex;gap:0.35rem;flex-wrap:wrap;}
.platform{font-family:var(--mono);font-size:0.62rem;border:1px solid var(--faint);border-radius:4px;padding:0.15rem 0.45rem;color:var(--muted);}
.prod-pipeline{display:flex;align-items:center;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-top:0.1rem;}
.prod-step{flex:1;text-align:center;font-family:var(--mono);font-size:0.58rem;letter-spacing:0.03em;padding:0.28rem 0.2rem;color:var(--muted);border-right:1px solid var(--border);cursor:pointer;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none;}
.prod-step:last-child{border-right:none;}.prod-step:hover{background:rgba(240,235,255,0.06);}
.prod-step.active-sinempezar{background:rgba(240,235,255,0.08);color:var(--text);}
.prod-step.active-enproduccion{background:rgba(255,140,66,0.18);color:var(--orange);}
.prod-step.active-listo{background:rgba(41,241,255,0.15);color:var(--cyan);}
.prod-note{font-size:0.72rem;color:var(--muted);font-style:italic;line-height:1.4;padding:0.3rem 0.5rem;background:rgba(0,0,0,0.2);border-radius:4px;border-left:2px solid var(--border);}
.prod-note.note-sinempezar{border-left-color:rgba(240,235,255,0.2);}
.prod-note.note-enproduccion{border-left-color:var(--orange);color:rgba(255,140,66,0.85);}
.prod-note.note-listo{border-left-color:var(--cyan);color:rgba(41,241,255,0.8);}
.card-actions{display:flex;gap:0.5rem;margin-top:0.1rem;}
.btn-approve,.btn-reject,.btn-undo{font-family:var(--mono);font-size:0.68rem;letter-spacing:0.04em;border-radius:6px;padding:0.38rem 0.7rem;cursor:pointer;border:1px solid;transition:all .2s;flex:1;text-align:center;}
.btn-approve{background:rgba(168,255,62,0.1);border-color:rgba(168,255,62,0.4);color:var(--green);}
.btn-approve:hover{background:rgba(168,255,62,0.22);}
.btn-reject{background:rgba(255,46,154,0.08);border-color:rgba(255,46,154,0.3);color:var(--pink);}
.btn-reject:hover{background:rgba(255,46,154,0.18);}
.btn-undo{background:rgba(240,235,255,0.05);border-color:var(--border);color:var(--muted);}
.btn-undo:hover{border-color:var(--muted);}
.status-label{font-family:var(--mono);font-size:0.68rem;text-align:center;padding:0.35rem;border-radius:6px;}
.label-approved{background:rgba(168,255,62,0.1);color:var(--green);}
.label-rejected{background:rgba(255,46,154,0.1);color:var(--pink);}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(6,1,15,0.85);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:1.5rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;max-width:540px;width:100%;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
.modal-title{font-weight:700;font-size:1.05rem;}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:0.2rem;}
.modal-close:hover{color:var(--text);}
.modal-section{display:flex;flex-direction:column;gap:0.35rem;}
.modal-section-label{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}
.modal-section-content{font-size:0.9rem;line-height:1.55;color:var(--text);}
.modal-actions{display:flex;gap:0.6rem;margin-top:0.5rem;}
.modal-actions .btn-approve,.modal-actions .btn-reject,.modal-actions .btn-undo{font-size:0.78rem;padding:0.6rem 1rem;}
.modal-pipeline{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.3rem;}
.modal-prod-btn{font-family:var(--mono);font-size:0.72rem;border:1px solid var(--border);border-radius:6px;padding:0.45rem 0.9rem;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s;}
.modal-prod-btn:hover{border-color:var(--text);color:var(--text);}
.modal-prod-btn.active-sinempezar{border-color:var(--text);color:var(--text);background:rgba(240,235,255,0.08);}
.modal-prod-btn.active-enproduccion{border-color:var(--orange);color:var(--orange);background:rgba(255,140,66,0.12);}
.modal-prod-btn.active-listo{border-color:var(--cyan);color:var(--cyan);background:rgba(41,241,255,0.12);}
.modal-prod-note{font-size:0.82rem;line-height:1.5;padding:0.6rem 0.8rem;border-radius:6px;margin-top:0.2rem;}
.modal-prod-note.note-sinempezar{background:rgba(240,235,255,0.05);border:1px solid rgba(240,235,255,0.1);color:var(--muted);}
.modal-prod-note.note-enproduccion{background:rgba(255,140,66,0.08);border:1px solid rgba(255,140,66,0.25);color:rgba(255,140,66,0.9);}
.modal-prod-note.note-listo{background:rgba(41,241,255,0.07);border:1px solid rgba(41,241,255,0.2);color:rgba(41,241,255,0.85);}
.empty-slot{border:1px dashed var(--faint);border-radius:8px;padding:0.9rem;text-align:center;font-family:var(--mono);font-size:0.7rem;color:var(--faint);}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>

];

const TYPE_LABEL={linkedin:'Post LinkedIn',carrusel:'Carrusel Instagram',animado:'Vídeo animado',kike:'Vídeo',short:'Short vertical'};
const TYPE_CLASS={linkedin:'badge-linkedin',carrusel:'badge-carrusel',animado:'badge-animado',kike:'badge-kike',short:'badge-short'};
const DAYS=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

let weekOffset=4,activeFilter='all',openCardId=null;
const states={},prods={},prodNotes={};
CONTENT.forEach(c=>{states[c.id]=c.status;prods[c.id]=c.prod;prodNotes[c.id]=c.prodNote;});

// Semana 0 = 23 jun, Semana 1 = 30 jun, Semana 2 = 7 jul, Semana 3 = 14 jul, Semana 4 = 27 jul (lunes 27 jul)
const WEEK_STARTS=[
  new Date(2026,5,23), // semana 0: 23-29 jun
  new Date(2026,5,30), // semana 1: 30 jun - 6 jul
  new Date(2026,6,7),  // semana 2: 7-13 jul
  new Date(2026,6,13), // semana 3: 13-19 jul (contenido publicable Mar 14 - Dom 19)
  new Date(2026,6,27), // semana 4: 27 jul - 2 ago (contenido publicable Mar 28 - Dom 2 ago)
];
function getMonday(offset=0){
  const idx=Math.max(0,Math.min(WEEK_STARTS.length-1,offset));
  return new Date(WEEK_STARTS[idx]);
}
function formatDate(d){return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});}
function changeWeek(dir){
  weekOffset=Math.max(0,Math.min(WEEK_STARTS.length-1,weekOffset+dir));
  render();
}
function setFilter(f,el){activeFilter=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');render();}
function matchesFilter(card){
  if(activeFilter==='all')return true;
  if(activeFilter==='sin-empezar')return prods[card.id]==='sinempezar';
  if(activeFilter==='en-produccion')return prods[card.id]==='enproduccion';
  if(activeFilter==='pendiente')return prods[card.id]==='listo'&&states[card.id]==='pending';
  return card.type===activeFilter;
}
function setProd(id,prodKey,e){e&&e.stopPropagation();prods[id]=prodKey;if(prodKey!=='listo')states[id]='pending';render();if(openCardId===id)openModal(id);}
function approve(id,e){e&&e.stopPropagation();states[id]='approved';render();if(openCardId===id)openModal(id);}
function reject(id,e){e&&e.stopPropagation();states[id]='rejected';render();if(openCardId===id)openModal(id);}
function undo(id,e){e&&e.stopPropagation();states[id]='pending';render();if(openCardId===id)openModal(id);}
function openModal(id){
  const card=CONTENT.find(c=>c.id===id);if(!card)return;
  openCardId=id;
  const st=states[id],prod=prods[id];
  document.getElementById('modalTitle').textContent=card.title;
  document.getElementById('modalType').innerHTML=`<span class="type-badge ${TYPE_CLASS[card.type]}">${TYPE_LABEL[card.type]}</span>`;
  document.getElementById('modalPlatforms').textContent=card.platforms.join(' · ');
  document.getElementById('modalDesc').textContent=card.desc;
  document.getElementById('modalNotes').textContent=card.notes;
  document.getElementById('modalPipeline').innerHTML=PROD_STEPS.map(step=>`<button class="modal-prod-btn ${prod===step.key?step.cls:''}" onclick="setProd(${id},'${step.key}',event)">${step.label}</button>`).join('');
  const noteEl=document.getElementById('modalProdNote');
  noteEl.className=`modal-prod-note note-${prod}`;
  noteEl.textContent=prodNotes[id]||'';
  const ma=document.getElementById('modalActions');
  if(prod!=='listo'){
    ma.innerHTML=`<div style="font-family:var(--mono);font-size:0.75rem;color:var(--muted);padding:0.4rem 0;">Marca como "Listo para revisar" para poder aprobar o rechazar.</div>`;
  } else if(st==='pending'){
    ma.innerHTML=`<button class="btn-approve" onclick="approve(${id})">✓ Aprobar</button><button class="btn-reject" onclick="reject(${id})">✕ Rechazar</button>`;
  } else {
    const lbl=st==='approved'?'✓ Aprobada':'✕ Rechazada';
    const cls=st==='approved'?'label-approved':'label-rejected';
    ma.innerHTML=`<div class="status-label ${cls}" style="flex:1">${lbl}</div><button class="btn-undo" onclick="undo(${id})">↩ Deshacer</button>`;
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('modalOverlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modalOverlay').classList.remove('open');openCardId=null;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});
function render(){
  const monday=getMonday(weekOffset),sunday=new Date(monday);
  sunday.setDate(monday.getDate()+6);
  document.getElementById('weekLabel').textContent=formatDate(monday)+' – '+formatDate(sunday);
  const weekCards=CONTENT.filter(c=>c.week===weekOffset);
  document.getElementById('statTotal').textContent=weekCards.length;
  document.getElementById('statApproved').textContent=weekCards.filter(c=>states[c.id]==='approved').length;
  document.getElementById('statPending').textContent=weekCards.filter(c=>prods[c.id]==='listo'&&states[c.id]==='pending').length;
  document.getElementById('statProd').textContent=weekCards.filter(c=>prods[c.id]==='enproduccion').length;
  document.getElementById('statRejected').textContent=weekCards.filter(c=>states[c.id]==='rejected').length;
  const grid=document.getElementById('calendarGrid');
  grid.innerHTML='';
  const today=new Date();today.setHours(0,0,0,0);
  for(let d=0;d<7;d++){
    const date=new Date(monday);date.setDate(monday.getDate()+d);
    const isToday=date.getTime()===today.getTime(),isWeekend=d>=5;
    const col=document.createElement('div');col.className='day-col';
    const hdr=document.createElement('div');
    hdr.className='day-header'+(isToday?' today':'')+(isWeekend?' weekend':'');
    hdr.innerHTML=`<span class="day-name">${DAYS[d]}</span><span class="day-date">${formatDate(date)}</span>`;
    col.appendChild(hdr);
    const dayCards=CONTENT.filter(c=>c.week===weekOffset&&c.dayOffset===d&&matchesFilter(c));
    if(dayCards.length===0){
      const empty=document.createElement('div');empty.className='empty-slot';
      empty.textContent=activeFilter==='all'?'— sin piezas —':'— nada para este filtro —';
      col.appendChild(empty);
    } else {
      dayCards.forEach(card=>{
        const st=states[card.id],prod=prods[card.id];
        const el=document.createElement('div');
        el.className=`card ${st}`;
        el.onclick=()=>openModal(card.id);
        const pipelineHTML=`<div class="prod-pipeline" onclick="event.stopPropagation()">${PROD_STEPS.map(step=>`<div class="prod-step ${prod===step.key?step.cls:''}" onclick="setProd(${card.id},'${step.key}',event)" title="${step.label}">${step.label}</div>`).join('')}</div>`;
        const noteHTML=`<div class="prod-note note-${prod}" onclick="event.stopPropagation()">${prodNotes[card.id]||''}</div>`;
        let actionsHTML='';
        if(prod==='listo'){
          if(st==='pending'){
            actionsHTML=`<div class="card-actions"><button class="btn-approve" onclick="approve(${card.id},event)">✓ Aprobar</button><button class="btn-reject" onclick="reject(${card.id},event)">✕ Rechazar</button></div>`;
          } else {
            const lbl=st==='approved'?'✓ Aprobada':'✕ Rechazada';
            const cls=st==='approved'?'label-approved':'label-rejected';
            actionsHTML=`<div class="card-actions"><div class="status-label ${cls}" style="flex:1">${lbl}</div><button class="btn-undo" onclick="undo(${card.id},event)">↩</button></div>`;
          }
        }
        const platformsHTML=card.platforms.map(p=>`<span class="platform">${p}</span>`).join('');
        el.innerHTML=`
          <div class="card-top"><span class="type-badge ${TYPE_CLASS[card.type]}">${TYPE_LABEL[card.type]}</span><span class="status-dot dot-${st}"></span></div>
          <div class="card-title">${card.title}</div>
          ${pipelineHTML}${noteHTML}
          <div class="platforms">${platformsHTML}</div>
          ${actionsHTML}`;
        col.appendChild(el);
      });
    }
    grid.appendChild(col);
  }
}
render();
</script>
</body>
</html>
