<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantumSec — Calendario de Contenido</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#06010F; --panel:#100820; --card:#180D2E; --border:#2E1A4A;
  --text:#F0EBFF; --muted:rgba(240,235,255,0.5); --faint:rgba(240,235,255,0.15);
  --green:#A8FF3E; --pink:#FF2E9A; --cyan:#29F1FF; --yellow:#FFD93D; --purple:#B97FFF;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(6,1,15,0.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:0.9rem 1.5rem;
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
}
.logo{font-family:var(--mono);font-size:0.85rem;font-weight:600;letter-spacing:0.1em;color:var(--green);}
.logo span{color:var(--muted);}
.week-nav{display:flex;align-items:center;gap:0.6rem;margin-left:auto;}
.week-label{font-family:var(--mono);font-size:0.8rem;color:var(--muted);}
.btn-nav{background:none;border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;transition:border-color .2s;}
.btn-nav:hover{border-color:var(--green);}

/* ── STATS BAR ── */
.statsbar{
  display:flex;gap:1px;background:var(--border);
  border-bottom:1px solid var(--border);
}
.stat{
  flex:1;background:var(--panel);padding:0.8rem 1rem;
  display:flex;flex-direction:column;gap:0.2rem;
}
.stat-num{font-family:var(--mono);font-size:1.4rem;font-weight:600;}
.stat-label{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
.stat-num.green{color:var(--green);}
.stat-num.pink{color:var(--pink);}
.stat-num.cyan{color:var(--cyan);}
.stat-num.yellow{color:var(--yellow);}

/* ── FILTERS ── */
.filters{
  padding:0.8rem 1.5rem;
  display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;
  border-bottom:1px solid var(--border);
  background:var(--panel);
}
.filter-label{font-size:0.75rem;color:var(--muted);font-family:var(--mono);margin-right:0.3rem;}
.chip{
  font-size:0.72rem;font-family:var(--mono);
  border:1px solid var(--border);border-radius:999px;
  padding:0.3rem 0.75rem;cursor:pointer;
  background:transparent;color:var(--muted);
  transition:all .2s;
}
.chip:hover,.chip.active{border-color:var(--green);color:var(--green);background:rgba(168,255,62,0.08);}
.chip[data-filter="kike"].active{border-color:var(--pink);color:var(--pink);background:rgba(255,46,154,0.08);}
.chip[data-filter="pendiente"].active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,217,61,0.08);}

/* ── GRID ── */
.grid-wrap{overflow-x:auto;padding:1.5rem;}
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,minmax(200px,1fr));
  gap:1rem;
  min-width:1400px;
}
.day-col{display:flex;flex-direction:column;gap:0.6rem;}
.day-header{
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:0.7rem 0.9rem;
  display:flex;flex-direction:column;gap:0.1rem;
}
.day-name{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.day-date{font-weight:700;font-size:1.05rem;}
.day-header.today{border-color:var(--green);background:rgba(168,255,62,0.05);}
.day-header.today .day-name{color:var(--green);}
.day-header.weekend .day-date{color:var(--muted);}

/* ── CARDS ── */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:0.85rem;
  display:flex;flex-direction:column;gap:0.6rem;
  transition:transform .2s,box-shadow .2s;
  cursor:pointer;
  position:relative;
}
.card:hover{transform:translateY(-2px);}
.card.approved{border-left:3px solid var(--green);}
.card.approved:hover{box-shadow:0 8px 24px -8px rgba(168,255,62,0.3);}
.card.rejected{border-left:3px solid var(--pink);opacity:0.6;}
.card.pending{border-left:3px solid var(--yellow);}
.card.pending:hover{box-shadow:0 8px 24px -8px rgba(255,217,61,0.2);}

.card-top{display:flex;align-items:flex-start;gap:0.5rem;justify-content:space-between;}
.type-badge{
  font-family:var(--mono);font-size:0.62rem;letter-spacing:0.06em;
  text-transform:uppercase;border-radius:999px;
  padding:0.22rem 0.6rem;white-space:nowrap;flex-shrink:0;
}
.badge-linkedin{background:rgba(41,241,255,0.15);color:var(--cyan);border:1px solid rgba(41,241,255,0.3);}
.badge-carrusel{background:rgba(185,127,255,0.15);color:var(--purple);border:1px solid rgba(185,127,255,0.3);}
.badge-animado{background:rgba(168,255,62,0.15);color:var(--green);border:1px solid rgba(168,255,62,0.3);}
.badge-kike{background:rgba(255,46,154,0.15);color:var(--pink);border:1px solid rgba(255,46,154,0.3);}
.badge-short{background:rgba(255,217,61,0.15);color:var(--yellow);border:1px solid rgba(255,217,61,0.3);}

.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.dot-pending{background:var(--yellow);}
.dot-approved{background:var(--green);}
.dot-rejected{background:var(--pink);}

.card-title{font-weight:600;font-size:0.88rem;line-height:1.35;}
.card-desc{font-size:0.78rem;color:var(--muted);line-height:1.45;}

.platforms{display:flex;gap:0.35rem;flex-wrap:wrap;}
.platform{
  font-family:var(--mono);font-size:0.62rem;
  border:1px solid var(--faint);border-radius:4px;
  padding:0.15rem 0.45rem;color:var(--muted);
}

.card-actions{display:flex;gap:0.5rem;margin-top:0.2rem;}
.btn-approve,.btn-reject,.btn-undo{
  font-family:var(--mono);font-size:0.68rem;letter-spacing:0.04em;
  border-radius:6px;padding:0.38rem 0.7rem;cursor:pointer;
  border:1px solid;transition:all .2s;flex:1;text-align:center;
}
.btn-approve{background:rgba(168,255,62,0.1);border-color:rgba(168,255,62,0.4);color:var(--green);}
.btn-approve:hover{background:rgba(168,255,62,0.22);}
.btn-reject{background:rgba(255,46,154,0.08);border-color:rgba(255,46,154,0.3);color:var(--pink);}
.btn-reject:hover{background:rgba(255,46,154,0.18);}
.btn-undo{background:rgba(240,235,255,0.05);border-color:var(--border);color:var(--muted);}
.btn-undo:hover{border-color:var(--muted);}

.status-label{
  font-family:var(--mono);font-size:0.68rem;text-align:center;
  padding:0.35rem;border-radius:6px;
}
.label-approved{background:rgba(168,255,62,0.1);color:var(--green);}
.label-rejected{background:rgba(255,46,154,0.1);color:var(--pink);}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(6,1,15,0.85);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;padding:1.5rem;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--panel);border:1px solid var(--border);
  border-radius:12px;max-width:520px;width:100%;
  padding:1.5rem;display:flex;flex-direction:column;gap:1rem;
  max-height:90vh;overflow-y:auto;
}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;}
.modal-title{font-weight:700;font-size:1.05rem;}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:0.2rem;}
.modal-close:hover{color:var(--text);}
.modal-section{display:flex;flex-direction:column;gap:0.35rem;}
.modal-section-label{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);}
.modal-section-content{font-size:0.9rem;line-height:1.55;color:var(--text);}
.modal-actions{display:flex;gap:0.6rem;margin-top:0.5rem;}
.modal-actions .btn-approve,.modal-actions .btn-reject,.modal-actions .btn-undo{font-size:0.78rem;padding:0.6rem 1rem;}

/* ── EMPTY SLOT ── */
.empty-slot{
  border:1px dashed var(--faint);border-radius:8px;
  padding:0.9rem;text-align:center;
  font-family:var(--mono);font-size:0.7rem;color:var(--faint);
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">QUANTUMSEC <span>// CONTENT OS</span></div>
  <div class="week-nav">
    <button class="btn-nav" onclick="changeWeek(-1)">←</button>
    <span class="week-label" id="weekLabel">Cargando...</span>
    <button class="btn-nav" onclick="changeWeek(1)">→</button>
  </div>
</div>

<!-- STATS -->
<div class="statsbar">
  <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-label">Piezas totales</span></div>
  <div class="stat"><span class="stat-num green" id="statApproved">0</span><span class="stat-label">Aprobadas</span></div>
  <div class="stat"><span class="stat-num yellow" id="statPending">0</span><span class="stat-label">Pendientes</span></div>
  <div class="stat"><span class="stat-num pink" id="statRejected">0</span><span class="stat-label">Rechazadas</span></div>
</div>

<!-- FILTERS -->
<div class="filters">
  <span class="filter-label">FILTRAR:</span>
  <button class="chip active" data-filter="all" onclick="setFilter('all',this)">Todo</button>
  <button class="chip" data-filter="linkedin" onclick="setFilter('linkedin',this)">LinkedIn</button>
  <button class="chip" data-filter="carrusel" onclick="setFilter('carrusel',this)">Carrusel</button>
  <button class="chip" data-filter="animado" onclick="setFilter('animado',this)">Vídeo animado</button>
  <button class="chip" data-filter="kike" onclick="setFilter('kike',this)">Vídeos</button>
  <button class="chip" data-filter="pendiente" onclick="setFilter('pendiente',this)">⏳ Pendientes</button>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-section">
      <span class="modal-section-label">Tipo</span>
      <span class="modal-section-content" id="modalType"></span>
    </div>
    <div class="modal-section">
      <span class="modal-section-label">Plataforma(s)</span>
      <span class="modal-section-content" id="modalPlatforms"></span>
    </div>
    <div class="modal-section">
      <span class="modal-section-label">Descripción</span>
      <span class="modal-section-content" id="modalDesc"></span>
    </div>
    <div class="modal-section">
      <span class="modal-section-label">Notas de producción</span>
      <span class="modal-section-content" id="modalNotes"></span>
    </div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
// ─── DATOS DE CONTENIDO ───────────────────────────────────────────────────────
// Aquí puedes añadir, editar o quitar piezas. Cada pieza tiene:
// dayOffset: 0=lunes, 1=martes ... 6=domingo
// type: 'linkedin' | 'carrusel' | 'animado' | 'kike' | 'short'
// platforms: array con 'LinkedIn', 'Instagram', 'Reels', 'TikTok'
// status: 'pending' | 'approved' | 'rejected'

const CONTENT = [
  // ── LUNES ──
  {
    id:1, dayOffset:0,
    type:'kike', platforms:['LinkedIn','Reels'],
    title:'Kike: Phishing — cómo reconocerlo',
    desc:'.',
    notes:'Vídeo ya editado. Revisar que el overlay esté sincronizado antes de aprobar. 1080x1920 para Reels.',
    status:'pending'
  },
  {
    id:2, dayOffset:0,
    type:'carrusel', platforms:['Reels'],
    title:'Carrusel vertical: Phishing — señales de alerta',
    desc:'Carrusel vertical complementario al vídeo de Kike. Refuerza los puntos clave en formato estático.',
    notes:'Formato vertical 1080x1920. Mismo tema que el vídeo del lunes para coherencia editorial.',
    status:'pending'
  },

  // ── MARTES ──
  {
    id:3, dayOffset:1,
    type:'kike', platforms:['LinkedIn','Reels'],
    title:'Kike: Defacement — cuando hackean tu web',
    desc:'.',
    notes:'Vídeo ya editado. Comprobar overlay de ejemplos visuales. Subtítulos Faster-Whisper.',
    status:'pending'
  },
  {
    id:4, dayOffset:1,
    type:'linkedin', platforms:['LinkedIn'],
    title:'Post: Tu web puede estar hackeada y no saberlo',
    desc:'Post de texto complementario al vídeo de defacement. Explicación práctica y CTA a auditoría.',
    notes:'Generar con content_multiplier.py usando el tema defacement. Tono directo.',
    status:'pending'
  },

  // ── MIÉRCOLES ──
  {
    id:5, dayOffset:2,
    type:'kike', platforms:['LinkedIn','Reels'],
    title:'Kike: Seguridad para Startups',
    desc:'.',
    notes:'Vídeo ya editado. Overlay con 5 puntos clave para startups. Paleta corporativa.',
    status:'pending'
  },
  {
    id:6, dayOffset:2,
    type:'animado', platforms:['Reels','LinkedIn'],
    title:'Vídeo animado: Los 5 errores de seguridad en startups',
    desc:'Explainer animado Remotion con los 5 puntos del vídeo de Kike, desarrollados visualmente. Vertical para Reels.',
    notes:'Componente explainer nuevo. SVG animado. Sin voz — subtítulos grandes. 1080x1920.',
    status:'pending'
  },

  // ── JUEVES ──
  {
    id:7, dayOffset:3,
    type:'kike', platforms:['LinkedIn','Reels'],
    title:'Kike: WordPress y sus riesgos de seguridad',
    desc:'.',
    notes:'Vídeo ya editado. Overlay con porcentajes y datos de vulnerabilidades WordPress 2026.',
    status:'pending'
  },
  {
    id:8, dayOffset:3,
    type:'carrusel', platforms:['Reels'],
    title:'Carrusel vertical: WordPress — qué revisar ahora mismo',
    desc:'Carrusel vertical con checklist de seguridad para webs WordPress. Complementa el vídeo de Kike.',
    notes:'Formato vertical 1080x1920. Misma línea visual que el carrusel de phishing.',
    status:'pending'
  },

  // ── VIERNES ──
  {
    id:9, dayOffset:4,
    type:'kike', platforms:['LinkedIn','Reels'],
    title:'Kike: Horquilla de precios en auditorías',
    desc:'.',
    notes:'Vídeo ya editado. Overlay con rangos de precios animados. Muy útil para captar leads.',
    status:'pending'
  },
  {
    id:10, dayOffset:4,
    type:'linkedin', platforms:['LinkedIn'],
    title:'Post: ¿Cuánto cuesta una auditoría de seguridad?',
    desc:'Post de texto desglosando los rangos de precio y qué incluye cada nivel. Atrae a directivos indecisos.',
    notes:'Generar con content_multiplier.py. CTA directo a contacto QuantumSec.',
    status:'pending'
  },

  // ── SÁBADO ──
  {
    id:11, dayOffset:5,
    type:'kike', platforms:['LinkedIn','Reels'],
    title:'Kike: ¿Cuánto dura una auditoría?',
    desc:'.',
    notes:'Vídeo ya editado. Overlay con timeline visual de fases. Buen contenido para el fin de semana.',
    status:'pending'
  },
  {
    id:12, dayOffset:5,
    type:'animado', platforms:['Reels'],
    title:'Vídeo animado: Fases de una auditoría en 60 segundos',
    desc:'Explainer vertical animado resumiendo las fases de una auditoría. Refuerza el vídeo de Kike del sábado.',
    notes:'Formato 1080x1920. Animación de timeline. Sin voz, subtítulos grandes.',
    status:'pending'
  },

  // ── DOMINGO ──
  {
    id:13, dayOffset:6,
    type:'kike', platforms:['LinkedIn','Reels'],
    title:'Kike: El factor diferencial de QuantumSec',
    desc:'.',
    notes:'Vídeo ya editado. Overlay con bullets animados. Pieza clave de marca — revisar bien.',
    status:'pending'
  },
];

// ─── ESTADO ──────────────────────────────────────────────────────────────────
let weekOffset = 0;
let activeFilter = 'all';
let openCardId = null;
const states = {}; // { id: 'pending'|'approved'|'rejected' }
CONTENT.forEach(c => states[c.id] = c.status);

// ─── SEMANA ───────────────────────────────────────────────────────────────────
function getMonday(offset = 0) {
  const now = new Date();
  const day = now.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const monday = new Date(now);
  monday.setDate(now.getDate() + diff + offset * 7);
  monday.setHours(0,0,0,0);
  return monday;
}

function formatDate(d) {
  return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});
}

function changeWeek(dir) {
  weekOffset += dir;
  render();
}

// ─── BADGES ──────────────────────────────────────────────────────────────────
const TYPE_LABEL = {
  linkedin:'Post LinkedIn', carrusel:'Carrusel Instagram',
  animado:'Vídeo animado', kike:'Vídeo', short:'Short vertical'
};
const TYPE_CLASS = {
  linkedin:'badge-linkedin', carrusel:'badge-carrusel',
  animado:'badge-animado', kike:'badge-kike', short:'badge-short'
};
const DAYS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

// ─── FILTRO ───────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function matchesFilter(card) {
  if (activeFilter === 'all') return true;
  if (activeFilter === 'pendiente') return states[card.id] === 'pending';
  return card.type === activeFilter;
}

// ─── ACCIONES ─────────────────────────────────────────────────────────────────
function approve(id, e) {
  e && e.stopPropagation();
  states[id] = 'approved';
  render();
  if (openCardId === id) openModal(id);
}
function reject(id, e) {
  e && e.stopPropagation();
  states[id] = 'rejected';
  render();
  if (openCardId === id) openModal(id);
}
function undo(id, e) {
  e && e.stopPropagation();
  states[id] = 'pending';
  render();
  if (openCardId === id) openModal(id);
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id) {
  const card = CONTENT.find(c => c.id === id);
  if (!card) return;
  openCardId = id;
  const st = states[id];
  document.getElementById('modalTitle').textContent = card.title;
  document.getElementById('modalType').innerHTML = `<span class="type-badge ${TYPE_CLASS[card.type]}">${TYPE_LABEL[card.type]}</span>`;
  document.getElementById('modalPlatforms').textContent = card.platforms.join(' · ');
  document.getElementById('modalDesc').textContent = card.desc;
  document.getElementById('modalNotes').textContent = card.notes;
  const ma = document.getElementById('modalActions');
  if (st === 'pending') {
    ma.innerHTML = `<button class="btn-approve" onclick="approve(${id})">✓ Aprobar</button><button class="btn-reject" onclick="reject(${id})">✕ Rechazar</button>`;
  } else {
    const lbl = st === 'approved' ? '✓ Aprobada' : '✕ Rechazada';
    const cls = st === 'approved' ? 'label-approved' : 'label-rejected';
    ma.innerHTML = `<div class="status-label ${cls}" style="flex:1">${lbl}</div><button class="btn-undo" onclick="undo(${id})">↩ Deshacer</button>`;
  }
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  openCardId = null;
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModalDirect(); });

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const monday = getMonday(weekOffset);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  document.getElementById('weekLabel').textContent =
    formatDate(monday) + ' – ' + formatDate(sunday);

  // stats
  const all = CONTENT;
  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('statApproved').textContent = all.filter(c=>states[c.id]==='approved').length;
  document.getElementById('statPending').textContent = all.filter(c=>states[c.id]==='pending').length;
  document.getElementById('statRejected').textContent = all.filter(c=>states[c.id]==='rejected').length;

  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  const today = new Date(); today.setHours(0,0,0,0);

  for (let d = 0; d < 7; d++) {
    const date = new Date(monday); date.setDate(monday.getDate() + d);
    const isToday = date.getTime() === today.getTime();
    const isWeekend = d >= 5;

    const col = document.createElement('div');
    col.className = 'day-col';

    // header
    const hdr = document.createElement('div');
    hdr.className = 'day-header' + (isToday?' today':'') + (isWeekend?' weekend':'');
    hdr.innerHTML = `<span class="day-name">${DAYS[d]}</span><span class="day-date">${formatDate(date)}</span>`;
    col.appendChild(hdr);

    // cards
    const dayCards = CONTENT.filter(c => c.dayOffset === d && matchesFilter(c));
    if (dayCards.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-slot';
      empty.textContent = activeFilter === 'all' ? '— sin piezas —' : '— nada para este filtro —';
      col.appendChild(empty);
    } else {
      dayCards.forEach(card => {
        const st = states[card.id];
        const el = document.createElement('div');
        el.className = `card ${st}`;
        el.onclick = () => openModal(card.id);

        let actionsHTML = '';
        if (st === 'pending') {
          actionsHTML = `
            <div class="card-actions">
              <button class="btn-approve" onclick="approve(${card.id},event)">✓ Aprobar</button>
              <button class="btn-reject" onclick="reject(${card.id},event)">✕ Rechazar</button>
            </div>`;
        } else {
          const lbl = st==='approved' ? '✓ Aprobada' : '✕ Rechazada';
          const cls = st==='approved' ? 'label-approved' : 'label-rejected';
          actionsHTML = `
            <div class="card-actions">
              <div class="status-label ${cls}" style="flex:1">${lbl}</div>
              <button class="btn-undo" onclick="undo(${card.id},event)">↩</button>
            </div>`;
        }

        const platformsHTML = card.platforms
          .map(p=>`<span class="platform">${p}</span>`).join('');

        el.innerHTML = `
          <div class="card-top">
            <span class="type-badge ${TYPE_CLASS[card.type]}">${TYPE_LABEL[card.type]}</span>
            <span class="status-dot dot-${st}"></span>
          </div>
          <div class="card-title">${card.title}</div>
          <div class="card-desc">${card.desc.substring(0,80)}…</div>
          <div class="platforms">${platformsHTML}</div>
          ${actionsHTML}`;
        col.appendChild(el);
      });
    }

    grid.appendChild(col);
  }
}

render();
</script>
</body>
</html>
